<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gradient Generator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --text: #aaa;
    --text-dim: #555;
    --text-bright: #ddd;
    --accent: #888;
    --panel-w: 280px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, system-ui, sans-serif;
    font-size: 12px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Top Bar ── */
  #topbar {
    height: 48px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 16px;
    flex-shrink: 0;
    z-index: 10;
  }

  .tb-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); }

  .preset-dots { display: flex; gap: 5px; }
  .dot {
    width: 22px; height: 22px; border-radius: 50%;
    cursor: pointer; border: 1.5px solid transparent;
    transition: border-color 150ms, transform 150ms;
    position: relative;
  }
  .dot.active { border-color: #fff; transform: scale(1.15); }
  .dot-label {
    position: absolute; bottom: -16px; left: 50%; transform: translateX(-50%);
    font-size: 9px; color: var(--text-dim); white-space: nowrap; opacity: 0;
    transition: opacity 150ms; pointer-events: none;
  }
  .dot:hover .dot-label { opacity: 1; }

  .sep { width: 1px; height: 22px; background: var(--border); margin: 0 4px; }

  #exportSize {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 4px 8px; border-radius: 6px;
    font-size: 11px; cursor: pointer; outline: none;
  }
  #exportSize option { background: #222; }

  #exportBtn {
    margin-left: auto;
    background: #fff; color: #000;
    border: none; padding: 6px 16px;
    border-radius: 6px; font-size: 11px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.04em;
    transition: opacity 150ms;
  }
  #exportBtn:hover { opacity: 0.85; }
  #exportBtn:active { opacity: 0.7; }

  /* ── Layout ── */
  #app {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Preview ── */
  #preview-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #preview {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
  }

  /* Grain overlay — animiert für Live-Vorschau */
  #preview::after {
    content: '';
    position: absolute;
    inset: -100%;
    width: 300%;
    height: 300%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 180px 180px;
    opacity: var(--grain-op, 0.1);
    mix-blend-mode: overlay;
    pointer-events: none;
    z-index: 20;
    animation: gs 0.4s steps(1) infinite;
  }
  @keyframes gs {
    0%  { transform: translate(0,0); }
    25% { transform: translate(-4%,-3%); }
    50% { transform: translate(3%,4%); }
    75% { transform: translate(-3%,2%); }
  }

  /* ── Controls Panel ── */
  #panel {
    width: var(--panel-w);
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  #panel-scroll {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: #333 transparent;
  }

  .section {
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .section-title {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    font-weight: 600;
  }

  .orb-color-swatch {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.1);
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
  }

  .orb-color-swatch input[type=color] {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  /* Rows */
  .row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .row:last-child { margin-bottom: 0; }

  .row-label {
    font-size: 10px;
    color: var(--text-dim);
    width: 36px;
    flex-shrink: 0;
  }

  .row-val {
    font-size: 10px;
    color: var(--text-dim);
    width: 30px;
    text-align: right;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }

  input[type=range] {
    flex: 1;
    appearance: none;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--text);
    cursor: pointer;
    transition: background 150ms, transform 150ms;
  }
  input[type=range]:hover::-webkit-slider-thumb {
    background: #fff;
    transform: scale(1.2);
  }

  /* Global section */
  .global-row {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  }
  .global-row:last-child { margin-bottom: 0; }
  .bg-swatch {
    width: 24px; height: 24px; border-radius: 5px;
    border: 1px solid rgba(255,255,255,0.1);
    cursor: pointer; position: relative; flex-shrink: 0;
  }
  .bg-swatch input[type=color] {
    position: absolute; inset: 0; opacity: 0;
    cursor: pointer; width: 100%; height: 100%;
  }

  /* ── Export flash ── */
  #flash {
    position: fixed; inset: 0; background: #fff;
    opacity: 0; pointer-events: none;
    transition: opacity 80ms;
    z-index: 9999;
  }
  #flash.on { opacity: 0.6; }
</style>
</head>
<body>

<div id="flash"></div>

<!-- Top Bar -->
<div id="topbar">
  <span class="tb-label">Preset</span>
  <div class="preset-dots" id="dots"></div>
  <div class="sep"></div>
  <span class="tb-label">Export</span>
  <select id="exportSize">
    <option value="2100,900">21:9 — 2100×900 (Blog Cover)</option>
    <option value="1920,1080">16:9 — 1920×1080</option>
    <option value="1500,1000">3:2 — 1500×1000</option>
    <option value="1200,1200">1:1 — 1200×1200</option>
    <option value="1080,1920">9:16 — 1080×1920 (Story)</option>
  </select>
  <button id="exportBtn">↓ PNG exportieren</button>
</div>

<!-- App -->
<div id="app">

  <!-- Preview -->
  <div id="preview-wrap">
    <div id="preview"></div>
  </div>

  <!-- Controls -->
  <div id="panel">
    <div id="panel-scroll">
      <!-- Orb sections rendered by JS -->
      <div id="orb-sections"></div>

      <!-- Global -->
      <div class="section">
        <div class="section-header">
          <span class="section-title">Global</span>
        </div>
        <div class="global-row">
          <div class="bg-swatch" id="bgSwatch" title="Hintergrundfarbe">
            <input type="color" id="bgColor">
          </div>
          <span class="row-label" style="width:auto">Hintergrund</span>
        </div>
        <div class="row">
          <span class="row-label">Grain</span>
          <input type="range" id="grainSlider" min="0" max="25" value="10">
          <span class="row-val" id="grainVal">10%</span>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────

const PRESETS = [
  {
    name: 'Rosé Dawn',
    dotColor: '#C8906A',
    bg: '#F5EDE8',
    grain: 10,
    orbs: [
      { color: '#C8906A', x: 15, y: 20, w: 65, h: 60, blur: 90, op: 72 },
      { color: '#B87FA8', x: 72, y: 60, w: 55, h: 65, blur: 80, op: 60 },
      { color: '#E8C4B0', x: 40, y: 80, w: 60, h: 50, blur: 70, op: 55 },
      { color: '#9B7090', x: 85, y: 15, w: 40, h: 50, blur: 85, op: 45 },
    ],
  },
  {
    name: 'Dusty Mauve',
    dotColor: '#A07898',
    bg: '#EDE8F0',
    grain: 9,
    orbs: [
      { color: '#A07898', x: 10, y: 10, w: 70, h: 55, blur: 95, op: 75 },
      { color: '#C8A090', x: 65, y: 55, w: 60, h: 60, blur: 80, op: 62 },
      { color: '#D4B8CC', x: 50, y: -10, w: 55, h: 50, blur: 75, op: 50 },
      { color: '#887098', x: 80, y: 75, w: 45, h: 55, blur: 90, op: 48 },
    ],
  },
  {
    name: 'Warm Dusk',
    dotColor: '#D4906C',
    bg: '#F2EBE5',
    grain: 11,
    orbs: [
      { color: '#D4906C', x: 60, y: 10, w: 70, h: 60, blur: 100, op: 68 },
      { color: '#A87888', x:  5, y: 55, w: 60, h: 65, blur: 85,  op: 65 },
      { color: '#E0C4A8', x: 30, y: 70, w: 65, h: 45, blur: 70,  op: 52 },
      { color: '#C09898', x: 75, y: 65, w: 40, h: 50, blur: 90,  op: 42 },
    ],
  },
  {
    name: 'Pale Plum',
    dotColor: '#9880B8',
    bg: '#ECE8F2',
    grain: 10,
    orbs: [
      { color: '#9880B8', x: 20, y: 15, w: 65, h: 70, blur: 90,  op: 70 },
      { color: '#C8A0A8', x: 65, y: 50, w: 60, h: 55, blur: 80,  op: 58 },
      { color: '#B890C4', x: -5, y: 65, w: 55, h: 60, blur: 95,  op: 50 },
      { color: '#D4B8D0', x: 80, y:  5, w: 45, h: 50, blur: 75,  op: 45 },
    ],
  },
  {
    name: 'Fig & Cream',
    dotColor: '#9A6878',
    bg: '#F0EAE8',
    grain: 12,
    orbs: [
      { color: '#9A6878', x:  5, y:  5, w: 60, h: 65, blur: 88,  op: 72 },
      { color: '#C8A888', x: 55, y: 60, w: 70, h: 55, blur: 80,  op: 60 },
      { color: '#B88898', x: 70, y:  5, w: 50, h: 60, blur: 92,  op: 55 },
      { color: '#E8C8B8', x: 25, y: 75, w: 60, h: 45, blur: 70,  op: 48 },
    ],
  },
  {
    name: 'Blush Mist',
    dotColor: '#D4A0A8',
    bg: '#F4EDEC',
    grain: 10,
    orbs: [
      { color: '#D4A0A8', x: 30, y:  5, w: 75, h: 55, blur: 100, op: 70 },
      { color: '#A88898', x: -5, y: 50, w: 60, h: 70, blur: 85,  op: 62 },
      { color: '#C8B0C0', x: 65, y: 65, w: 55, h: 55, blur: 75,  op: 52 },
      { color: '#E0C0B8', x: 80, y: 20, w: 45, h: 50, blur: 90,  op: 44 },
    ],
  },
]

// Deep clone current state
let state = JSON.parse(JSON.stringify(PRESETS[0]))
let currentPreset = 0

// ─────────────────────────────────────────────────────────────
// RENDER — Live Preview
// ─────────────────────────────────────────────────────────────

const preview = document.getElementById('preview')

function renderPreview() {
  preview.style.background = state.bg
  document.documentElement.style.setProperty('--grain-op', state.grain / 100)

  // Remove existing orbs
  preview.querySelectorAll('.orb').forEach(el => el.remove())

  state.orbs.forEach(o => {
    const el = document.createElement('div')
    el.className = 'orb'
    el.style.cssText = `
      left:    ${o.x}%;
      top:     ${o.y}%;
      width:   ${o.w}%;
      height:  ${o.h}%;
      background: ${o.color};
      filter:  blur(${o.blur}px);
      opacity: ${o.op / 100};
    `
    preview.appendChild(el)
  })
}

// ─────────────────────────────────────────────────────────────
// CONTROLS — Build Orb Sections
// ─────────────────────────────────────────────────────────────

const orbSections = document.getElementById('orb-sections')

function buildControls() {
  orbSections.innerHTML = ''

  state.orbs.forEach((orb, i) => {
    const sec = document.createElement('div')
    sec.className = 'section'
    sec.innerHTML = `
      <div class="section-header">
        <span class="section-title">Orb ${i + 1}</span>
        <div class="orb-color-swatch" style="background:${orb.color}" id="swatch-${i}">
          <input type="color" value="${orb.color}" data-orb="${i}" data-prop="color">
        </div>
      </div>
      ${slider(i, 'op',   'Deckkraft', orb.op,   0, 100, '%')}
      ${slider(i, 'blur', 'Weichheit', orb.blur,  0, 150, 'px')}
      ${slider(i, 'x',   'X',         orb.x,  -30, 130, '%')}
      ${slider(i, 'y',   'Y',         orb.y,  -30, 130, '%')}
      ${slider(i, 'w',   'Breite',    orb.w,   10, 150, '%')}
      ${slider(i, 'h',   'Höhe',      orb.h,   10, 150, '%')}
    `
    orbSections.appendChild(sec)
  })

  // Wire up color pickers
  orbSections.querySelectorAll('input[type=color]').forEach(inp => {
    inp.addEventListener('input', e => {
      const i = +e.target.dataset.orb
      state.orbs[i].color = e.target.value
      document.getElementById(`swatch-${i}`).style.background = e.target.value
      renderPreview()
    })
  })

  // Wire up sliders
  orbSections.querySelectorAll('input[type=range]').forEach(inp => {
    inp.addEventListener('input', e => {
      const i    = +e.target.dataset.orb
      const prop = e.target.dataset.prop
      const val  = +e.target.value
      state.orbs[i][prop] = val
      document.getElementById(`val-${i}-${prop}`).textContent =
        val + e.target.dataset.unit
      renderPreview()
    })
  })
}

function slider(orbIdx, prop, label, val, min, max, unit) {
  return `
    <div class="row">
      <span class="row-label">${label}</span>
      <input type="range" min="${min}" max="${max}" value="${val}"
        data-orb="${orbIdx}" data-prop="${prop}" data-unit="${unit}">
      <span class="row-val" id="val-${orbIdx}-${prop}">${val}${unit}</span>
    </div>
  `
}

// ─────────────────────────────────────────────────────────────
// GLOBAL CONTROLS
// ─────────────────────────────────────────────────────────────

const bgColorInp  = document.getElementById('bgColor')
const bgSwatch    = document.getElementById('bgSwatch')
const grainSlider = document.getElementById('grainSlider')
const grainVal    = document.getElementById('grainVal')

bgColorInp.value = state.bg
bgSwatch.style.background = state.bg

bgColorInp.addEventListener('input', e => {
  state.bg = e.target.value
  bgSwatch.style.background = e.target.value
  renderPreview()
})

grainSlider.value = state.grain
grainSlider.addEventListener('input', e => {
  state.grain = +e.target.value
  grainVal.textContent = e.target.value + '%'
  renderPreview()
})

// ─────────────────────────────────────────────────────────────
// PRESETS
// ─────────────────────────────────────────────────────────────

const dotsEl = document.getElementById('dots')

PRESETS.forEach((p, i) => {
  const d = document.createElement('div')
  d.className = 'dot' + (i === 0 ? ' active' : '')
  d.style.background = p.dotColor
  d.title = p.name
  d.innerHTML = `<span class="dot-label">${p.name}</span>`
  d.onclick = () => loadPreset(i)
  dotsEl.appendChild(d)
})

function loadPreset(i) {
  currentPreset = i
  state = JSON.parse(JSON.stringify(PRESETS[i]))
  grainSlider.value = state.grain
  grainVal.textContent = state.grain + '%'
  bgColorInp.value = state.bg
  bgSwatch.style.background = state.bg
  document.querySelectorAll('.dot').forEach((d, j) => d.classList.toggle('active', j === i))
  buildControls()
  renderPreview()
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') loadPreset((currentPreset + 1) % PRESETS.length)
  if (e.key === 'ArrowLeft')  loadPreset((currentPreset - 1 + PRESETS.length) % PRESETS.length)
})

// ─────────────────────────────────────────────────────────────
// EXPORT — Canvas-basiert mit echtem Grain
// ─────────────────────────────────────────────────────────────

document.getElementById('exportBtn').addEventListener('click', exportPNG)

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16)
  const g = parseInt(hex.slice(3,5),16)
  const b = parseInt(hex.slice(5,7),16)
  return { r, g, b }
}

function exportPNG() {
  const sizeVal = document.getElementById('exportSize').value
  const [W, H] = sizeVal.split(',').map(Number)

  const cnv = document.createElement('canvas')
  cnv.width = W; cnv.height = H
  const ctx = cnv.getContext('2d')

  // 1 — Background
  ctx.fillStyle = state.bg
  ctx.fillRect(0, 0, W, H)

  // 2 — Orbs (each with its own blur via ctx.filter)
  state.orbs.forEach(o => {
    ctx.save()
    const px = (o.x / 100) * W
    const py = (o.y / 100) * H
    const pw = (o.w / 100) * W
    const ph = (o.h / 100) * H
    const cx = px + pw / 2
    const cy = py + ph / 2
    const rx = pw / 2
    const ry = ph / 2

    ctx.filter = `blur(${o.blur * (W / preview.offsetWidth)}px)`
    ctx.globalAlpha = o.op / 100

    // Elliptical radial gradient
    ctx.save()
    ctx.translate(cx, cy)
    ctx.scale(1, ry / rx)
    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, rx)
    const { r, g, b } = hexToRgb(o.color)
    grad.addColorStop(0,   `rgba(${r},${g},${b},1)`)
    grad.addColorStop(0.6, `rgba(${r},${g},${b},0.4)`)
    grad.addColorStop(1,   `rgba(${r},${g},${b},0)`)
    ctx.fillStyle = grad
    ctx.beginPath()
    ctx.arc(0, 0, rx * 1.2, 0, Math.PI * 2)
    ctx.fill()
    ctx.restore()
    ctx.restore()
  })

  // 3 — Grain (pixel noise)
  ctx.filter = 'none'
  ctx.globalAlpha = 1
  const imgData = ctx.getImageData(0, 0, W, H)
  const d = imgData.data
  const grainAmt = state.grain * 2.5 // scale to pixel intensity

  for (let i = 0; i < d.length; i += 4) {
    const noise = (Math.random() - 0.5) * grainAmt
    d[i]     = Math.min(255, Math.max(0, d[i]     + noise))
    d[i + 1] = Math.min(255, Math.max(0, d[i + 1] + noise))
    d[i + 2] = Math.min(255, Math.max(0, d[i + 2] + noise))
  }
  ctx.putImageData(imgData, 0, 0)

  // 4 — Flash animation
  const flash = document.getElementById('flash')
  flash.classList.add('on')
  setTimeout(() => flash.classList.remove('on'), 120)

  // 5 — Download
  const presetName = PRESETS[currentPreset].name.toLowerCase().replace(/\s+/g, '-')
  cnv.toBlob(blob => {
    const url = URL.createObjectURL(blob)
    const a   = document.createElement('a')
    a.href     = url
    a.download = `gradient-${presetName}-${W}x${H}.png`
    a.click()
    setTimeout(() => URL.revokeObjectURL(url), 1000)
  }, 'image/png')
}

// ─────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────
buildControls()
renderPreview()
</script>
</body>
</html>
